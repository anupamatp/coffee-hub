<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background:#f5f2ef; font-family:Arial, sans-serif;">

<div style="max-width:600px; margin:auto; background:#ffffff; border-radius:10px; overflow:hidden; box-shadow:0 4px 10px rgba(0,0,0,0.1);">

    <!-- Header -->
    <div style="background:#6F4E37; padding:22px; text-align:center; color:#fff;">
        <h2 style="margin:0;">☕ Table Booking Confirmed</h2>
    </div>

    <!-- Body -->
    <div style="padding:25px;">

        <p style="font-size:16px;">Hello <strong>{{name}}</strong>,</p>

        <p style="font-size:15px; line-height:22px;">
            Your table has been successfully booked! Here are the details:
        </p>

        <div style="background:#f7f3ef; padding:15px; border-radius:8px; margin-top:15px;">

            <p><strong>Table Number:</strong> {{tableNumber}}</p>
            <p><strong>Booking Time:</strong> {{bookingTime}}</p>
            <p><strong>No. of People:</strong> {{people}}</p>

        </div>

        <a href="{{ctaUrl}}"
           style="display:inline-block; margin-top:20px; padding:12px 20px;
                  background:#6F4E37; color:#fff; text-decoration:none;
                  border-radius:6px; font-size:15px;">
            Visit Website
        </a>
    </div>

    <!-- Footer -->
    <div style="background:#f0e8e2; padding:15px; text-align:center; font-size:12px; color:#6b6b6b;">
        © 2025 The Coffee Bean. All rights reserved.
    </div>

</div>

</body>
</html>
