<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background:#f7f3ef; font-family:Arial, sans-serif;">

<div style="max-width:600px; margin:auto; background:#ffffff; border-radius:10px; overflow:hidden; box-shadow:0 4px 10px rgba(0,0,0,0.1);">

    <div style="background:#6F4E37; padding:20px; text-align:center; color:#fff;">
        <h1 style="margin:0; font-size:26px;">☕ The Coffee Bean</h1>
        <p style="margin:5px 0 0;">Order Confirmation</p>
    </div>

    <div style="padding:25px;">
        <p style="font-size:16px;">Hello <strong>{{name}}</strong>,</p>

        <p style="font-size:15px; line-height:22px;">
            Your order has been successfully placed! 🎉
            Below are the details:
        </p>

        <h3 style="margin-top:20px;">Order Summary</h3>


        <p><strong>Total Amount:</strong> ₹{{totalAmount}}</p>

        <h3 style="margin-top:20px;">Items:</h3>
        <div>
            {{items}}
        </div>

        <p style="font-size:15px; margin-top:20px;">Enjoy your coffee! ☕</p>

        <a href="http://localhost:3000"
           style="display:inline-block; margin-top:20px; padding:12px 20px;
                  background:#6F4E37; color:#fff; text-decoration:none;
                  border-radius:6px; font-size:15px;">
            Visit Website
        </a>
    </div>

    <div style="background:#f0e8e2; padding:15px; text-align:center; font-size:12px; color:#6b6b6b;">
        © 2025 The Coffee Bean. All rights reserved.
    </div>

</div>
</body>
</html>
